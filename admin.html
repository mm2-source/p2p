<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>لوحة تحكم الإدارة التنفيذية</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
  
  <script src="firebase-config.js"></script>
  <script src="admin.js" defer></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #f4f7f6; }
    h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; background: #fff; margin-bottom: 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    th { background-color: #007bff; color: white; }
    button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    .btn-withdraw { background: #28a745; color: white; }
    .btn-release { background: #ffc107; color: #333; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.8; }
  </style>
</head>
<body>

  <h2>💰 سحب أرباح (إرسال USDT فعلي)</h2>
  <table id="withdrawTable">
    <thead>
      <tr>
        <th>عنوان المحفظة</th>
        <th>المبلغ</th>
        <th>الإجراء</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>🔄 تحرير عملات (إرسال USDT فعلي)</h2>
  <table id="releaseTable">
    <thead>
      <tr>
        <th>رقم الطلب</th>
        <th>المبلغ (USDT)</th>
        <th>الإجراء</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</body>
</html>
